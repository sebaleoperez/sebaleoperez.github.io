name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Validate front matter
        run: ruby scripts/validate_front_matter.rb

      - name: Audit social images
        run: ruby scripts/check_social_images.rb

      - name: Build site
        run: bundle exec jekyll build

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --accept 200,206,429
            --exclude-mail
            --exclude-path .lycheeignore
            './_site/**/*.html'
            './*.html'
            './_posts/**/*.markdown'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
