<div class="container pagination-container">
  <nav class="pagination" role="pagination" aria-label="Pagination">
    <ul>
      {% if paginator.previous_page %}
        <li>
          <a class="page-btn" href="{{ site.baseurl }}{% if paginator.previous_page == 1 %}/{% else %}/page/{{ paginator.previous_page }}/{% endif %}" aria-label="Previous Page">
            ← <span class="sr-only">Previous</span>
          </a>
        </li>
      {% endif %}

      <li>
        <span class="page-number">
          <span class="page-number-label" data-label-es="Pag" data-label-en="Page">Pag</span>
          {{ paginator.page }} / {{ paginator.total_pages }}
        </span>
      </li>

      {% if paginator.next_page %}
        <li>
          <a class="page-btn" href="{{ site.baseurl }}/page/{{ paginator.next_page }}/" aria-label="Next Page">
            → <span class="sr-only">Next</span>
          </a>
        </li>
      {% endif %}
    </ul>
  </nav>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      let lang = urlParams.get("lang");

      // Si no hay lang en la URL, usar el idioma del navegador sin forzar redirect
      if (!lang) {
        const browserLang = navigator.language || navigator.userLanguage;
        lang = browserLang.startsWith("es") ? "es" : "en";
      }

      const pageLabel = document.querySelector('.page-number-label');
      if (pageLabel) {
        pageLabel.textContent = lang === 'es' ? pageLabel.dataset.labelEs : pageLabel.dataset.labelEn;
      }

      // Aplica el lang a la paginación
      document.querySelectorAll('.pagination a').forEach(link => {
        const url = new URL(link.href);
        url.searchParams.set("lang", lang);
        link.href = url.pathname + url.search;
      });

      // Filtra bloques por idioma
      document.querySelectorAll('[data-lang]').forEach(block => {
        const blockLang = block.dataset.lang;
        block.style.display = (blockLang === lang) ? "" : "none";
      });
    
    });
    </script>
</div>
